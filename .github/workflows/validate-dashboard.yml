name: Validate dashboard bundle

on:
  pull_request:
    paths:
      - "index.html"
      - "src/**"
      - "data/market/**"
      - "data/insights/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "src/**"
      - "data/market/**"
      - "data/insights/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify generated dashboard
        run: npm run check
