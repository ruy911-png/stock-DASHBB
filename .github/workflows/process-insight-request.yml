name: Process investment insight request

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-pr:
    if: github.event.issue.user.login == github.repository_owner && startsWith(github.event.issue.title, '[투자 인사이트]')
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply insight request
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/process-insight-request.mjs

      - name: Validate dashboard and data
        run: npm run check

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          branch="automation/insight-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add data/insights/index.json
          git commit -m "Update investment insight from issue ${ISSUE_NUMBER}"
          git push origin "$branch"
          pr_url=$(gh pr create --base main --head "$branch" --title "투자 인사이트 요청 #${ISSUE_NUMBER} 반영" --body "GitHub Issue #${ISSUE_NUMBER}에서 제출한 투자 인사이트 요청을 자동 반영합니다.\n\n검증: npm run check 통과")
          gh issue comment "$ISSUE_NUMBER" --body "자동 반영 PR이 생성되었습니다: ${pr_url}"
          gh issue close "$ISSUE_NUMBER"
