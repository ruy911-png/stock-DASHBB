document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1c3b6d6e-1cb2-4223-8156-a886e49bcd68\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n\n<link rel=\"preconnect\" href=\"https://cdn.jsdelivr.net\">\n<style>\n  * { box-sizing: border-box; }\n  ::-webkit-scrollbar { width: 10px; height: 10px; }\n  ::-webkit-scrollbar-thumb { background: #D5D5E0; border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }\n  ::-webkit-scrollbar-track { background: transparent; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; width:100%; display:flex; background:#EEEFF5; font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; color:#16161D;\">\n\n  <!-- ===================== SIDEBAR ===================== -->\n  <div style=\"width:248px; flex-shrink:0; background:#fff; border-right:1px solid #E7E7EE; display:flex; flex-direction:column; padding:24px 16px; position:sticky; top:0; height:100vh;\">\n    <div style=\"display:flex; align-items:center; gap:11px; padding:4px 8px 22px;\">\n      <div style=\"width:40px; height:40px; border-radius:12px; background:linear-gradient(150deg,#6B62F0,#8B73F2); display:flex; align-items:center; justify-content:center; font-size:20px;\">📓<\u002Fdiv>\n      <div>\n        <div style=\"font-size:15.5px; font-weight:800; letter-spacing:-.3px;\">주식킹<\u002Fdiv>\n        <div style=\"font-size:11px; color:#9A9AAC; margin-top:1px;\">나만의 투자 노트<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:4px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <div onclick=\"{{ n.onClick }}\" style=\"display:flex; align-items:center; gap:12px; padding:11px 13px; border-radius:13px; cursor:pointer; background:{{ n.bg }};\">\n          <div style=\"width:22px; height:22px; flex-shrink:0; color:{{ n.col }};\">\n            <div style=\"font-size:18px; line-height:22px; text-align:center;\">{{ n.icon }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-size:14.5px; font-weight:{{ n.weight }}; color:{{ n.col }};\">{{ n.label }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;\"><\u002Fdiv>\n\n    <sc-if value=\"{{ isSaved }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ onReset }}\" style=\"display:flex; align-items:center; gap:8px; padding:10px 13px; border-radius:11px; cursor:pointer; color:#9A9AAC;\">\n        <span style=\"font-size:14px;\">↺<\u002Fspan><span style=\"font-size:13px; font-weight:700;\">저장 데이터 초기화<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"font-size:10.5px; color:#B7B7C6; padding:10px 13px 0; line-height:1.5;\">기록은 이 브라우저에 저장돼요 · KOSPI · 원화<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== MAIN ===================== -->\n  <div style=\"flex:1; min-width:0; height:100vh; overflow:auto;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:32px 40px 60px;\">\n\n      <!-- ===================== HOME ===================== -->\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"홈\">\n        <div style=\"display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:24px;\">\n          <div>\n            <div style=\"font-size:13px; color:#9A9AAC; font-weight:600;\">{{ dateStr }}<\u002Fdiv>\n            <div style=\"font-size:28px; font-weight:800; letter-spacing:-.6px; margin-top:5px;\">한눈에 보기<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px; color:#8C8C9E;\">종목분석 · 매매일지 · 과거 사례를 한곳에<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:20px;\">\n          <sc-for list=\"{{ homeCards }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ c.onClick }}\" style=\"backgrou =\"font-size:15px; font-weight:800; color:{{ h.col }};\">{{ h.plFmt }}<\u002Fdiv>\n                    <div style=\"font-size:11.5px; font-weight:700; color:{{ h.col }}; margin-top:2px;\">{{ h.pctFmt }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:14px; font-weight:800; color:#56566A; margin:0 4px 12px;\">거래 기록 · 회고<\u002Fdiv>\n            <sc-for list=\"{{ trades }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ t.onToggle }}\" style=\"background:#fff; border-radius:18px; margin-bottom:11px; box-shadow:0 6px 22px rgba(40,40,90,.05); border:1px solid #EFEFF5; padding:16px 18px; cursor:pointer;\">\n                <div style=\"display:flex; align-items:center; gap:13px;\">\n                  <div style=\"width:44px; height:44px; border-radius:14px; background:{{ t.moodBg }}; display:flex; align-items:center; justify-content:center; font-size:23px; flex-shrink:0;\">{{ t.mood }}<\u002Fdiv>\n                  <div style=\"flex:1; min-width:0;\">\n                    <div style=\"display:flex; align-items:center; gap:6px;\">\n                      <span style=\"font-size:15px; font-weight:800; letter-spacing:-.2px;\">{{ t.name }}<\u002Fspan>\n                      <span style=\"font-size:10.5px; font-weight:800; color:{{ t.typeCol }}; background:{{ t.typeBg }}; padding:2px 7px; border-radius:6px;\">{{ t.type }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:11.5px; color:#A0A0B0; margin-top:3px;\">{{ t.qty }}주 · {{ t.priceFmt }}원 · {{ t.date }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"text-align:right;\">\n                    <div style=\"font-size:15px; font-weight:800; color:{{ t.plCol }};\">{{ t.plFmt }}<\u002Fdiv>\n                    <div style=\"font-size:11px; font-weight:700; color:{{ t.plCol }}; margin-top:1px;\">{{ t.plPctFmt }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{ t.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:13px; padding-top:13px; border-top:1px dashed #E8E8EF;\">\n                  <div style=\"font-size:11px; font-weight:800; color:#9A9AAC; margin-bottom:5px;\">💭 당시 생각 · 회고<\u002Fdiv>\n                  <div style=\"font-size:13px; color:#4E4E60; line-height:1.65;\">{{ t.memo }}<\u002Fdiv>\n                  <div style=\"margin-top:11px; background:#FFF7E9; border-radius:12px; padding:11px 13px;\">\n                    <div style=\"font-size:11px; font-weight:800; color:#C08A2B;\">🔖 장중 특이사항<\u002Fdiv>\n                    <div style=\"font-size:12.5px; color:#8A6E3C; margin-top:3px; line-height:1.55;\">{{ t.note }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== PREDICT ===================== -->\n      <sc-if value=\"{{ isPredict }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"예측\">\n        <div style=\"margin-bottom:18px;\">\n          <div style=\"font-size:28px; font-weight:800; letter-spacing:-.6px;\">과거사례 Study<\u002Fdiv>\n          <div style=\"font-size:13px; color:#8C8C9E; margin-top:5px;\">비슷했던 과거의 뉴스와 그 뒤 주가 흐름<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:10px; margin-bottom:20px;\">\n          <sc-for list=\"{{ caseChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ c.onClick }}\" style=\"cursor:pointer; padding:12px 18px; border-radius:14px; background:{{ c.bg }}; border:1.5px solid {{ c.border }};\">\n              <div style=\"font-size:14px; font-weight:800; color:{{ c.titleCol }};\">{{ c.title }}<\u002Fdiv>\n              <div style=\"font-size:11px; color:{{ c.subCol }}; margin-top:2px;\">{{ c.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1.25fr 1fr; gap:18px; align-items:start;\">\n          <div style=\"background:#fff; border-radius:22px; box-shadow:0 6px 22px rgba(40,40,90,.05); border:1px solid #EFEFF5; padding:22px;\">\n            <div style=\"display:flex; align-items:center; gap:8px;\">\n              <div style=\"font-size:11px; font-weight:800; color:#fff; background:{{ caseTagCol }}; padding:4px 10px; border-radius:8px;\">{{ caseTag }}<\u002Fdiv>\n              <div style=\"font-size:14px; font-weight:800; color:#16161D;\">{{ caseSub }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#56566A; line-height:1.65; margin-top:12px;\">{{ caseSummary }}<\u002Fdiv>\n\n            <div style=\"margin-top:18px; background:#FBFBFE; border:1px solid #F0F0F6; border-radius:16px; padding:16px 16px 10px;\">\n              <div style=\"display:flex; gap:24px; margin-bottom:10px;\">\n                <div>\n                  <div style=\"font-size:11px; color:#A0A0B0; font-weight:600;\">최대 낙폭<\u002Fdiv>\n                  <div style=\"font-size:22px; font-weight:800; color:#2F6FED;\">{{ caseDrop }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:11px; color:#A0A0B0; font-weight:600;\">저점까지<\u002Fdiv>\n                  <div style=\"font-size:22px; font-weight:800; color:#16161D;\">{{ caseBottom }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:11px; color:#A0A0B0; font-weight:600;\">회복 기간<\u002Fdiv>\n                  <div style=\"font-size:22px; font-weight:800; color:#F23645;\">{{ caseRecover }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <svg viewBox=\"0 0 300 120\" width=\"100%\" height=\"150\" preserveAspectRatio=\"none\" style=\"display:block;\">\n                <defs>\n                  <linearGradient id=\"cg2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                    <stop offset=\"0%\" stop-color=\"#6B62F0\" stop-opacity=\"0.22\"><\u002Fstop>\n                    <stop offset=\"100%\" stop-color=\"#6B62F0\" stop-opacity=\"0\"><\u002Fstop>\n                  <\u002FlinearGradient>\n                <\u002Fdefs>\n                <path d=\"{{ caseArea }}\" fill=\"url(#cg2)\"><\u002Fpath>\n                <path d=\"{{ caseLine }}\" fill=\"none\" stroke=\"#6B62F0\" stroke-width=\"2.4\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath>\n                <line x1=\"{{ caseEventX }}\" y1=\"6\" x2=\"{{ caseEventX }}\" y2=\"114\" stroke=\"#F2A23B\" stroke-width=\"1.4\" stroke-dasharray=\"3 3\"><\u002Fline>\n                <circle cx=\"{{ caseEventX }}\" cy=\"{{ caseEventY }}\" r=\"4.5\" fill=\"#F2A23B\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n              <\u002Fsvg>\n              <div style=\"display:flex; justify-content:space-between; font-size:10.5px; color:#B7B7C6; margin-top:3px;\">\n                <span>{{ caseStart }}<\u002Fspan><span style=\"color:#E0922B; font-weight:700;\">⚑ 사건 발생<\u002Fspan><span>{{ caseEnd }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:linear-gradient(150deg,#5C54E8 0%,#7E6CF0 100%); border-radius:18px; padding:20px; color:#fff; margin-top:18px;\">\n              <div style=\"font-size:15px; font-weight:800;\">🧭 그래서 지금은?<\u002Fdiv>\n              <div style=\"font-size:13.5px; line-height:1.7; margin-top:10px; opacity:.95;\">{{ caseNow }}<\u002Fdiv>\n              <div style=\"display:flex; gap:10px; margin-top:16px;\">\n                <sc-for list=\"{{ caseScenarios }}\" as=\"s\" hint-placeholder-count=\"3\">\n                  <div style=\"background:rgba(255,255,255,.14); border-radius:13px; padding:11px 14px; flex:1;\">\n                    <div style=\"font-size:11.5px; opacity:.8;\">{{ s.label }}<\u002Fdiv>\n                    <div style=\"font-size:18px; font-weight:800; margin-top:3px;\">{{ s.prob }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"font-size:10.5px; opacity:.7; margin-top:13px; line-height:1.5;\">※ 과거 패턴 참고용이며 투자 판단은 본인 책임이에요.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:14px; font-weight:800; color:#56566A; margin:0 4px 14px;\">뉴스 · 반응 타임라인<\u002Fdiv>\n            <div style=\"position:relative;\">\n              <sc-for list=\"{{ caseTimeline }}\" as=\"e\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex; gap:14px; padding-bottom:16px;\">\n                  <div style=\"display:flex; flex-direction:column; align-items:center; flex-shrink:0;\">\n                    <div style=\"width:14px; height:14px; border-radius:50%; background:{{ e.dotCol }}; border:3px solid {{ e.dotRing }}; z-index:2;\"><\u002Fdiv>\n                    <div style=\"width:2px; flex:1; background:#E4E4EE; margin-top:3px;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1; background:#fff; border-radius:16px; box-shadow:0 4px 16px rgba(40,40,90,.05); border:1px solid #EFEFF5; padding:14px 16px; margin-top:-3px;\">\n                    <div style=\"display:flex; align-items:center; gap:8px;\">\n                      <span style=\"font-size:11.5px; font-weight:700; color:#9A9AAC;\">{{ e.date }}<\u002Fspan>\n                      <span style=\"font-size:10.5px; font-weight:800; color:{{ e.sCol }}; background:{{ e.sBg }}; padding:3px 8px; border-radius:7px;\">{{ e.sentiment }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:15px; font-weight:800; letter-spacing:-.2px; margin-top:8px;\">{{ e.label }}<\u002Fdiv>\n                    <div style=\"font-size:12.5px; color:#6A6A7C; margin-top:5px; line-height:1.55;\">{{ e.desc }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== MARKET ===================== -->\n      <sc-if value=\"{{ isMarket }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"시황분석\">\n        <div style=\"display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:18px;\">\n          <div>\n            <div style=\"font-size:28px; font-weight:800; letter-spacing:-.6px;\">시황분석<\u002Fdiv>\n            <div style=\"font-size:13px; color:#8C8C9E; margin-top:5px;\">오늘 시장을 한눈에 · {{ dateStr }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px;\">\n            <sc-if value=\"{{ marketSaved }}\" hint-placeholder-val=\"{{ false }}\">\n              <div onclick=\"{{ resetMarket }}\" style=\"font-size:12px; font-weight:700; color:#9A9AAC; cursor:pointer; white-space:nowrap;\">↺ 예시로<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"font-size:12px; font-weight:700; color:{{ marketMoodCol }}; background:{{ marketMoodBg }}; padding:8px 14px; border-radius:11px; white-space:nowrap;\">{{ marketMood }}<\u002Fdiv>\n            <div onclick=\"{{ openMarketPaste }}\" style=\"font-size:13px; font-weight:800; color:#fff; background:#6B62F0; padding:11px 16px; border-radius:12px; cursor:pointer; white-space:nowrap; box-shadow:0 6px 18px rgba(107,98,240,.32);\">📋 시황 붙여넣기<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n          <sc-for list=\"{{ indices }}\" as=\"i\" hint-placeholder-count=\"6\">\n            <div style=\"background:#fff; border-radius:20px; box-shadow:0 6px 22px rgba(40,40,90,.05); border:1px solid #EFEFF5; padding:18px 20px;\">\n              <div style=\"font-size:13px; font-weight:700; color:#8C8C9E;\">{{ i.name }}<\u002Fdiv>\n              <div style=\"font-size:24px; font-weight:800; letter-spacing:-.6px; margin-top:8px;\">{{ i.value }}<\u002Fdiv>\n              <div style=\"font-size:13px; font-weight:800; color:{{ i.col }}; margin-top:4px;\">{{ i.change }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:18px;\">\n          <div style=\"background:#fff; border-radius:22px; box-shadow:0 6px 22px rgba(40,40,90,.05); border:1px solid #EFEFF5; padding:22px;\">\n            <div style=\"font-size:15px; font-weight:800; letter-spacing:-.2px;\">투자자 수급<\u002Fdiv>\n            <div style=\"font-size:11.5px; color:#A0A0B0; margin-top:3px;\">코스피 · 순매수 (억원)<\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:18px;\">\n              <sc-for list=\"{{ flows }}\" as=\"f\" hint-placeholder-count=\"3\">\n                <div>\n                  <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px;\">\n                    <span style=\"font-size:13.5px; font-weight:700;\">{{ f.name }}<\u002Fspan>\n                    <span style=\"font-size:14px; font-weight:800; color:{{ f.col }};\">{{ f.amount }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:9px; background:#F1F1F6; border-radius:5px; overflow:hidden; display:flex; justify-content:{{ f.justify }};\">\n                    <div style=\"width:{{ f.width }}; background:{{ f.col }}; border-radius:5px;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:linear-gradient(150deg,#2A2740 0%,#3A3560 100%); border-radius:22px; padding:24px; color:#fff; margin-top:18px;\">\n          <div style=\"font-size:15px; font-weight:800;\">📰 오늘의 시황 코멘트<\u002Fdiv>\n          <div style=\"font-size:13.5px; line-height:1.7; margin-top:11px; opacity:.92;\">{{ marketComment }}<\u002Fdiv>\n          <div style=\"display:flex; gap:10px; margin-top:18px; flex-wrap:wrap;\">\n            <sc-for list=\"{{ marketKeywords }}\" as=\"k\" hint-placeholder-count=\"4\">\n              <div style=\"font-size:12px; font-weight:700; background:rgba(255,255,255,.12); padding:7px 13px; border-radius:10px;\">#{{ k }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== NEWS ===================== -->\n      <sc-if value=\"{{ isNews }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"언론검색\">\n        <div style=\"margin-bottom:18px;\">\n          <div style=\"font-size:28px; font-weight:800; letter-spacing:-.6px;\">언론검색<\u002Fdiv>\n          <div style=\"font-size:13px; color:#8C8C9E; margin-top:5px;\">종목 뉴스를 검색하고, 중요한 기사는 스크랩해 모아둬요<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff; border-radius:22px; box-shadow:0 6px 22px rgba(40,40,90,.05); border:1px solid #EFEFF5; padding:22px;\">\n          <div style=\"font-size:15px; font-weight:800; letter-spacing:-.2px; margin-bottom:13px;\">📰 뉴스 검색<\u002Fdiv>\n          <div style=\"display:flex; gap:10px;\">\n            <input oninput=\"{{ onNewsQuery }}\" value=\"{{ newsQuery }}\" placeholder=\"종목명이나 키워드를 입력하세요 (예: 삼성전자 HBM)\" style=\"flex:1; min-width:0; box-sizing:border-box; border:1.5px solid #E6E6EE; border-radius:12px; padding:13px 15px; font-size:14.5px; font-family:inherit; background:#FAFAFD;\">\n            <div onclick=\"{{ searchNaver }}\" style=\"background:#03C75A; color:#fff; font-size:14px; font-weight:800; padding:13px 20px; border-radius:12px; cursor:pointer; white-space:nowrap;\">네이버뉴스<\u002Fdiv>\n            <div onclick=\"{{ searchGoogle }}\" style=\"background:#fff; border:1.5px solid .65;\">{{ marketText }}<\u002Ftextarea>\n      <sc-if value=\"{{ marketMsg }}\" hint-placeholder-val=\"\">\n        <div style=\"font-size:13px; color:#C0392B; background:#FCEBEC; padding:10px 13px; border-radius:11px; margin-top:12px;\">{{ marketMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ submitMarketText }}\" style=\"margin-top:18px; background:#6B62F0; color:#fff; text-align:center; padding:15px; border-radius:14px; font-weight:800; font-size:15px; cursor:pointer; box-shadow:0 8px 22px rgba(107,98,240,.35);\">자동으로 채우기<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== ADD MODAL ===================== -->\n  <sc-if value=\"{{ addOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed; inset:0; z-index:80; background:rgba(18,18,32,.5); display:flex; align-items:center; justify-content:center; padding:32px;\">\n    <div onclick=\"{{ closeAdd }}\" style=\"position:absolute; inset:0;\"><\u002Fdiv>\n    <div style=\"position:relative; background:#fff; border-radius:24px; padding:26px 28px 24px; width:520px; max-width:100%; max-height:90vh; overflow:auto; box-shadow:0 30px 80px rgba(20,20,50,.4);\">\n      <div style=\"display:flex; align-items:center; margin-bottom:20px;\">\n        <div style=\"font-size:20px; font-weight:800; flex:1;\">종목분석 기록 추가<\u002Fdiv>\n        <div onclick=\"{{ closeAdd }}\" style=\"font-size:14px; color:#9A9AAC; cursor:pointer; font-weight:700;\">닫기<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"font-size:12.5px; font-weight:700; color:#7A7A8C;\">종목명 *<\u002Fdiv>\n        <input oninput=\"{{ onName }}\" placeholder=\"예: 삼성전자\" style=\"width:100%; box-sizing:border-box; border:1.5px solid #E6E6EE; border-radius:12px; padding:12px 14px; font-size:14.5px; font-family:inherit; color:#16161D; background:#FAFAFD; margin-top:7px;\">\n      <\u002Fdiv>\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"font-size:12.5px; font-weight:700; color:#7A7A8C;\">AI 선택<\u002Fdiv>\n        <div style=\"display:flex; gap:9px; margin-top:7px;\">\n          <sc-for list=\"{{ aiSeg }}\" as=\"g\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ g.onClick }}\" style=\"flex:1; text-align:center; padding:11px 0; border-radius:12px; font-weight:800; font-size:13.5px; cursor:pointer; color:{{ g.col }}; background:{{ g.bg }};\">{{ g.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12.5px; font-weight:700; color:#7A7A8C;\">분석 내용 붙여넣기 *<\u002Fdiv>\n        <textarea oninput=\"{{ onContent }}\" placeholder=\"클로드·제미나이·GPT의 분석 답변을 통째로 붙여넣으세요. 투자의견·목표가·근거 등 내용 그대로 저장돼요.\" style=\"width:100%; box-sizing:border-box; border:1.5px solid #E6E6EE; border-radius:12px; padding:13px 14px; font-size:14.5px; font-family:inherit; color:#16161D; background:#FAFAFD; margin-top:7px; min-height:200px; resize:vertical; line-height:1.65;\"><\u002Ftextarea>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ fErr }}\" hint-placeholder-val=\"\">\n        <div style=\"font-size:13px; color:#C0392B; background:#FCEBEC; padding:10px 13px; border-radius:11px; margin-top:12px;\">{{ fErr }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ submitAdd }}\" style=\"margin-top:18px; background:#6B62F0; color:#fff; text-align:center; padding:15px; border-radius:14px; font-weight:800; font-size:15px; cursor:pointer; box-shadow:0 8px 22px rgba(107,98,240,.35);\">분석 저장하기<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;1280&quot;,&quot;height&quot;:&quot;832&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'home',\n    aiFilter: 'all',\n    expandedAi: '005930',\n    expandedTrade: 0,\n    caseId: 'rate2022',\n    addOpen: false,\n    f_ai: 'claude', f_op: '매수',\n    f_name: '', f_content: '', f_code: '', f_price: '', f_target: '', f_reason: '', f_pros: '', f_risks: '',\n    f_err: '',\n    csvMsg: '',\n    analyses: null, trades: null,\n    marketOpen: false, marketText: '', marketData: null, marketMsg: '',\n    newsQuery: '', newsText: '', newsItems: null, newsMsg: '',\n  };\n\n  LS_ANALYSES = 'recdash_analyses_v1';\n  LS_TRADES = 'recdash_trades_v1';\n  LS_MARKET = 'recdash_market_v1';\n  LS_NEWS = 'recdash_news_v1';\n\n  componentDidMount() {\n    try {\n      const a = localStorage.getItem(this.LS_ANALYSES);\n      const t = localStorage.getItem(this.LS_TRADES);\n      const next = {};\n      if (a) next.analyses = JSON.parse(a);\n      if (t) next.trades = JSON.parse(t);\n      const m = localStorage.getItem(this.LS_MARKET);\n      if (m) next.marketData = JSON.parse(m);\n      const nw = localStorage.getItem(this.LS_NEWS);\n      if (nw) next.newsItems = JSON.parse(nw);\n      if (Object.keys(next).length) this.setState(next);\n    } catch (e) {}\n  }\n\n  saveAnalyses(list) { try { localStorage.setItem(this.LS_ANALYSES, JSON.stringify(list)); } catch (e) {} }\n  saveTrades(list) { try { localStorage.setItem(this.LS_TRADES, JSON.stringify(list)); } catch (e) {} }\n\n  resetAll() {\n    try { localStorage.removeItem(this.LS_ANALYSES); localStorage.removeItem(this.LS_TRADES); } catch (e) {}\n    this.setState({ analyses: null, trades: null, expandedAi: '005930', expandedTrade: 0, csvMsg: '' });\n  }\n\n  openMarketPaste() { this.setState({ marketOpen: true, marketMsg: '' }); }\n  closeMarketPaste() { this.setState({ marketOpen: false }); }\n  resetMarket() {\n    try { localStorage.removeItem(this.LS_MARKET); } catch (e) {}\n    this.setState({ marketData: null, marketText: '', marketMsg: '' });\n  }\n\n  parseMarket(text) {\n    const t = String(text || '');\n    const esc = a => a.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&');\n    const toNum = s => Number(String(s).replace(/[, ]/g, ''));\n    const idxDefs = [\n      { name: 'KOSPI', alias: ['코스피', 'KOSPI'] },\n      { name: 'KOSDAQ', alias: ['코스닥', 'KOSDAQ'] },\n      { name: '원/달러', alias: ['원/달러', '원달러', '달러/원', '환율'] },\n      { name: 'S&P500', alias: ['S&P500', 'S&P 500', 'SP500', 'S&P', '에스앤피'] },\n      { name: '나스닥', alias: ['나스닥', 'NASDAQ', 'Nasdaq'] },\n      { name: 'VIX', alias: ['VIX', '빅스', '변동성지수'] },\n    ];\n    let foundCount = 0;\n    const indices = idxDefs.map(d => {\n      let value = null, chg = null, found = false;\n      for (const a of d.alias) {\n        const safe = esc(a);\n        const m0 = t.match(new RegExp(safe, 'i'));\n        if (!m0) continue;\n        const after = t.slice(m0.index + a.length, m0.index + a.length + 40);\n        const mv = after.match(/[^0-9\\-+▲▼]{0,10}([0-9][0-9,]*\\.?[0-9]*)/);\n        if (mv) {\n          value = mv[1]; found = true; foundCount++;\n          const mp = after.match(/([+\\-−▲▼])?\\s*([0-9]+\\.?[0-9]*)\\s*%/);\n          if (mp) {\n            let sign = 1;\n            if (mp[1] && /[-−▼]/.test(mp[1])) sign = -1;\n            else if (mp[1] && /[+▲]/.test(mp[1])) sign = 1;\n            else if (/하락|약세|내림|마이너스/.test(after.slice(0, (mp.index || 0) + 5))) sign = -1;\n            chg = sign * Number(mp[2]);\n          }\n          break;\n        }\n      }\n      return { name: d.name, value, chg, found };\n    });\n\n    const flowDefs = ['외국인', '기관', '개인'];\n    const flows = flowDefs.map(n => {\n      const at = t.search(new RegExp(n));\n      let amount = null;\n      if (at >= 0) {\n        const seg = t.slice(at, at + 30);\n        const m = seg.match(/([+\\-−]?)\\s*([0-9][0-9,]*\\.?[0-9]*)/);\n        if (m) {\n          let sign = /[-−]/.test(m[1]) ? -1 : 1;\n          if (/순매도|매도 우위|매도세|팔자/.test(seg)) sign = -1;\n          if ((/순매수|매수 우위|매수세|사자/.test(seg)) && !/[-−]/.test(m[1])) sign = 1;\n          amount = sign * toNum(m[2]);\n          foundCount++;\n        }\n      }\n      return { name: n, amount };\n    });\n\n    if (foundCount === 0) return null;\n\n    const base = this.market;\n    const outIdx = indices.map((p, i) => ({\n      name: p.name,\n      value: p.value != null ? p.value : base.indices[i].value,\n      chg: p.chg != null ? p.chg : (p.found ? 0 : base.indices[i].chg),\n    }));\n    const outFlows = flows.map((p, i) => ({\n      name: p.name,\n      amount: p.amount != null ? p.amount : base.flows[i].amount,\n    }));\n\n    const stockIdx = outIdx.filter(x => x.name === 'KOSPI' || x.name === 'KOSDAQ' || x.name === 'S&P500' || x.name === '나스닥');\n    const avg = stockIdx.reduce((s, x) => s + x.chg, 0) / (stockIdx.length || 1);\n    const moodUp = avg >= 0;\n    const mood = moodUp ? '강세 흐름 · 위험선호' : '약세 흐름 · 위험회피';\n\n    const hashKw = (t.match(/#([^\\s#]+)/g) || []).map(s => s.replace('#', ''));\n    const keywords = hashKw.length ? hashKw.slice(0, 6) : base.keywords;\n    const comment = t.trim().slice(0, 400) || base.comment;\n\n    return { indices: outIdx, flows: outFlows, comment, keywords, mood, moodUp };\n  }\n\n  openNewsSearch(engine, q) {\n    const query = (q != null ? q : this.state.newsQuery).trim() || 'KOSPI 증시';\n    const enc = encodeURIComponent(query);\n    const urls = {\n      naver: 'https://search.naver.com/search.naver?where=news&query=' + enc,\n      google: 'https://news.google.com/search?q=' + enc + '&hl=ko&gl=KR',\n      daum: 'https://search.daum.net/search?w=news&q=' + enc,\n    };\n    try { window.open(urls[engine] || urls.naver, '_blank', 'noopener'); } catch (e) {}\n  }\n\n  saveNews(list) { try { localStorage.setItem(this.LS_NEWS, JSON.stringify(list)); } catch (e) {} }\n\n  submitNews() {\n    const lines = String(this.state.newsText || '').split(/\\r?\\n/).map(s => s.trim()).filter(Boolean);\n    if (!lines.length) { this.setState({ newsMsg: '기사 제목을 한 줄에 하나씩 입력해주세요.' }); return; }\n    const today = '6.26';\n    const parsed = lines.map(line => {\n      let title = line, source = '스크랩', date = today;\n      let rest = line.trim();\n      // 1) \"제목 | 매체 | 시간 l: col,\n        memo: t.memo, note: t.note,\n        expanded: this.state.expandedTrade === i,\n        onToggle: () => this.setState(s => ({ expandedTrade: s.expandedTrade === i ? null : i })),\n      };\n    });\n\n    const cs = this.cases.find(c => c.id === this.state.caseId) || this.cases[0];\n    const cp = this.buildCasePath(cs.shape);\n    const sentMap = {\n      '악재': { col: '#2F6FED', bg: '#EAF0FD', dot: '#2F6FED', ring: '#D5E2FB' },\n      '호재': { col: '#F23645', bg: '#FDECEC', dot: '#F23645', ring: '#FAD7D9' },\n      '중립': { col: '#8A8AA0', bg: '#F0F0F4', dot: '#9A9AAC', ring: '#E6E6EE' },\n    };\n    const caseChips = this.cases.map(c => {\n      const active = c.id === this.state.caseId;\n      return {\n        title: c.title, sub: c.sub,\n        bg: active ? '#16161D' : '#fff',\n        border: active ? '#16161D' : '#E6E6EE',\n        titleCol: active ? '#fff' : '#16161D',\n        subCol: active ? 'rgba(255,255,255,.6)' : '#A0A0B0',\n        onClick: () => this.setState({ caseId: c.id }),\n      };\n    });\n    const caseTimeline = cs.timeline.map(e => {\n      const s = sentMap[e.sentiment];\n      return { date: e.date, sentiment: e.sentiment, label: e.label, desc: e.desc, sCol: s.col, sBg: s.bg, dotCol: s.dot, dotRing: s.ring };\n    });\n\n    const seg = (label, active, col, bg, on) => ({ label, active, col: active ? '#fff' : col, bg: active ? col : bg, onClick: on });\n    const aiSeg = ['claude', 'gemini', 'gpt'].map(k => seg(this.AI[k].label, this.state.f_ai === k, this.AI[k].color, this.AI[k].bg, () => this.setF('f_ai', k)));\n    const csvHeader = '종목명,구분,수량,가격,손익,수익률,감정,날짜,메모,특이사항';\n    const csvSample = ['삼성전자,매도,30,74200,248000,12.4,😎,6.24,목표가 도달 분할 익절,외국인 순매수 유입', '에코프로비엠,매수,10,168000,,0,🤔,6.20,바닥 확인용 소량 진입,2차전지 거래량 급증'];\n    const sampleCsvHref = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\\uFEFF' + csvHeader + '\\n' + csvSample.join('\\n'));\n\n    const navDef = [\n      { key: 'home', label: '홈', icon: '🏠', go: () => this.go('home') },\n      { key: 'ai', label: '종목분석', icon: '🤖', go: () => this.go('ai') },\n      { key: 'market', label: '시황분석', icon: '📊', go: () => this.go('market') },\n      { key: 'news', label: '언론검색', icon: '📰', go: () => this.go('news') },\n      { key: 'study', label: '주식공부', icon: '📚', go: () => this.go('study') },\n      { key: 'journal', label: '매매일지', icon: '📒', go: () => this.go('journal') },\n      { key: 'predict', label: '과거사례 Study', icon: '🔮', go: () => this.go('predict') },\n    ];\n    const navItems = navDef.map(n => {\n      const active = tab === n.key;\n      return {\n        label: n.label, icon: n.icon,\n        bg: active ? '#F0EFFE' : 'transparent',\n        col: active ? '#6B62F0' : '#6A6A7C',\n        weight: active ? '800' : '600',\n        onClick: n.go,\n      };\n    });\n\n    // ---- Market ----\n    const mk = this.state.marketData || this.market;\n    const indices = mk.indices.map(i => ({\n      name: i.name, value: i.value,\n      change: (i.chg >= 0 ? '▲ +' : '▼ ') + Math.abs(i.chg).toFixed(2) + '%',\n      col: i.chg >= 0 ? UP : DOWN,\n    }));\n    const flowMax = Math.max(...mk.flows.map(f => Math.abs(f.amount)), 1);\n    const flows = mk.flows.map(f => ({\n      name: f.name,\n      amount: (f.amount >= 0 ? '+' : '−') + this.fmt(Math.abs(f.amount)),\n      col: f.amount >= 0 ? UP : DOWN,\n      lightCol: f.amount >= 0 ? '#FF9A9A' : '#8FB6FF',\n      width: (Math.abs(f.amount) / flowMax * 100).toFixed(0) + '%',\n      justify: f.amount >= 0 ? 'flex-start' : 'flex-end',\n    }));\n    const secMax = Math.max(...this.market.sectors.map(s => Math.abs(s.pct)), 1);\n    const sectors = this.market.sectors.map(s => ({\n      name: s.name,\n      pct: (s.pct >= 0 ? '+' : '') + s.pct.toFixed(1) + '%',\n      col: s.pct >= 0 ? UP : DOWN,\n      width: (Math.abs(s.pct) / secMax * 100).toFixed(0) + '%',\n      justify: s.pct >= 0 ? 'flex-start' : 'flex-end',\n    }));\n\n    // ---- Study ----\n    const studyNotes = this.study.notes;\n    const doneCount = this.study.rules.filter(r => r.done).length;\n    const studyRules = this.study.rules.map((r, i) => ({\n      text: r.text, done: r.done,\n      mark: r.done ? '✓' : '',\n      markBg: r.done ? '#1E8E5A' : '#fff',\n      markBorder: r.done ? '#1E8E5A' : '#D5D5E0',\n      textCol: r.done ? '#16161D' : '#8C8C9E',\n      onClick: () => this.setState(s => {\n        const rules = this.study.rules;\n        this.study = { ...this.study, rules: rules.map((x, j) => j === i ? { ...x, done: !x.done } : x) };\n        return {};\n      }),\n    }));\n    const rulePct = Math.round(doneCount / this.study.rules.length * 100);\n\n    // ---- News ----\n    const thumbPalette = [\n      ['#6B62F0', '#9A8CF5'], ['#2F8FED', '#5FB0F5'], ['#1EA86A', '#5CD49B'],\n      ['#F2783B', '#F7A36B'], ['#E0567A', '#F08CA6'], ['#7A5CE0', '#A98CF0'],\n    ];\n    const thumbFor = (s) => {\n      const key = String(s || '?');\n      let h = 0; for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) >>> 0;\n      const pair = thumbPalette[h % thumbPalette.length];\n      return { grad: 'linear-gradient(140deg,' + pair[0] + ',' + pair[1] + ')', initial: key.replace(/[^가-힣A-Za-z0-9]/g, '').slice(0, 2) || '뉴' };\n    };\n    const newsData = this.state.newsItems || [];\n    const mapNews = (n) => {\n      const th = thumbFor(n.source);\n      return {\n        title: n.title, source: n.source || '스크랩', date: n.date || '',\n        meta: (n.source || '스크랩') + (n.date ? ' · ' + n.date : ''),\n        thumbGrad: th.grad, thumbInitial: th.initial,\n        onSearch: () => this.openNewsSearch('naver', n.title),\n      };\n    };\n    const newsFeatured = newsData.length ? mapNews(newsData[0]) : null;\n    const newsRest = newsData.slice(1).map(mapNews);\n    const newsList = newsData.map(mapNews);\n    const newsPreview = newsData.slice(0, 2).map(n => ({ title: n.title, meta: (n.source || '스크랩') + ' · ' + (n.date || '') }));\n    const heldNames = this.holdings.map(h => h.name);\n    const newsQuickChips = [...heldNames.slice(0, 3), 'KOSPI 증시', '美 증시'].map(label => ({\n      label, onClick: () => { this.setState({ newsQuery: label }); this.openNewsSearch('naver', label); },\n    }));\n\n    return {\n      isHome: tab === 'home', isAi: tab === 'ai', isMarket: tab === 'market', isStudy: tab === 'study', isJournal: tab === 'journal', isPredict: tab === 'predict', isNews: tab === 'news',\n      goAi: () => this.go('ai'),\n      goStudy: () => this.go('study'),\n      goMarket: () => this.go('market'),\n      goNews: () => this.go('news'),\n      navItems,\n\n      newsQuery: this.state.newsQuery, newsText: this.state.newsText, newsMsg: this.state.newsMsg,\n      onNewsQuery: e => this.setF('newsQuery', e.target.value),\n      onNewsText: e => this.setF('newsText', e.target.value),\n      searchNaver: () => this.openNewsSearch('naver'),\n      searchGoogle: () => this.openNewsSearch('google'),\n      searchDaum: () => this.openNewsSearch('daum'),\n      submitNews: () => this.submitNews(), clearNews: () => this.clearNews(),\n      newsList, newsPreview, newsQuickChips,\n      newsFeatured, newsRest, newsHasFeatured: !!newsFeatured,\n      newsCount: newsData.length, newsHasItems: newsData.length > 0, newsEmpty: newsData.length === 0,\n\n      studyHomeMeta: this.study.notes.length + '개 노트 · 매매 원칙 ' + doneCount + '/' + this.study.rules.length,\n      studyHomeTitle: studyNotes[0].title,\n      studyHomeBody: studyNotes[0].body,\n\n      studyNotes, studyRules,\n      studyDoneText: doneCount + ' / ' + this.study.rules.length + ' 지킴',\n      studyPct: rulePct + '%', studyBarW: rulePct + '%',\n\n      marketMood: mk.mood, marketMoodCol: mk.moodUp ? UP : DOWN, marketMoodBg: mk.moodUp ? '#FDECEC' : '#EAF0FD',\n      indices, flows, sectors,\n      marketComment: mk.comment, marketKeywords: mk.keywords,\n      marketOpen: this.state.marketOpen, marketText: this.state.marketText, marketMsg: this.state.marketMsg,\n      marketSaved: !!this.state.marketData,\n      openMarketPaste: () => this.openMarketPaste(), closeMarketPaste: () => this.closeMarketPaste(),\n      onMarketText: e => this.setF('marketText', e.target.value), submitMarketText: () => this.submitMarketText(),\n      resetMarket: () => this.resetMarket(),\n\n      dateStr: '2026년 6월 26일 금요일',\n      homeCards: [\n        { icon: '🤖', bg: '#EFEDFE', title: '종목분석 모음', sub: '클로드·제미나이·GPT 의견 모아보기', stat: analysesData.length + '종목', statLabel: '보관됨', statCol: '#6B62F0', onClick: () => this.go('ai') },\n        { icon: '📒', bg: '#FFF0E8', title: '매매일지', sub: '보유 평가 + 매매 회고·특이사항', stat: tradesData.length + '종목', statLabel: '이번 달 매매', statCol: '#E07B2B', onClick: () => this.go('journal') },\n        { icon: '🔮', bg: '#E8F4FF', title: '과거사례 Study', sub: '비슷한 사례의 뉴스와 주가 흐름', stat: '3사례', statLabel: '참고용', statCol: '#3B72E0', onClick: () => this.go('predict') },\n      ],\n      homeAlert: '삼성전자에 대한 3개 AI 의견이 엇갈려요 (매수 2 · 관망 1). 카카오는 제미나이가 매도 의견을 냈어요.',\n      recent: [\n        { tag: '종목분석', tagCol: '#6B62F0', tagBg: '#EFEDFE', title: '삼성전자 — Claude 매수 의견 추가', meta: '목표가 88,000원 · 6.22', onClick: () => this.setState({ tab: 'ai', expandedAi: '005930', aiFilter: 'all' }) },\n        { tag: '일지', tagCol: '#E07B2B', tagBg: '#FFF0E8', title: '삼성전자 매도 회고 — 분할 익절', meta: '+248,000원 · 6.24', onClick: () => this.setState({ tab: 'journal', expandedTrade: 0 }) },\n        { tag: '사례', tagCol: '#3B72E0', tagBg: '#E8F4FF', title: '금리 인상기 — 뉴스 타임라인', meta: '최대 낙폭 −28% · 2022', onClick: () => this.setState({ tab: 'predict', caseId: 'rate2022' }) },\n      ],\n\n      analyses, aiFilters, aiCountText,\n\n      jPnl: jHomeStat + '원',\n      jPct: (avgPct >= 0 ? '+' : '−') + Math.abs(avgPct).toFixed(1) + '%',\n      jRate: winRate + '%',\n      jCount: tradesData.length + '건',\n      moodInsight: '여유로울 때(😎) 거래는 평균 +9.2%, 패닉(😱)에 판 거래는 −5.2%. 마음이 급할수록 한 박자 쉬어가는 게 좋아요.',\n      holdings, trades,\n\n      caseChips,\n      caseTag: cs.tag, caseTagCol: cs.tagCol, caseSub: cs.sub, caseSummary: cs.summary,\n      caseDrop: cs.drop, caseBottom: cs.bottom, caseRecover: cs.recover,\n      caseLine: cp.line, caseArea: cp.area,\n      caseEventX: cp.sx(cs.eventIdx).toFixed(1), caseEventY: cp.sy(cs.shape[cs.eventIdx]).toFixed(1),\n      caseStart: cs.start, caseEnd: cs.end,\n      caseTimeline, caseNow: cs.now,\n      caseScenarios: cs.scenarios,\n\n      addOpen: this.state.addOpen, fErr: this.state.f_err, csvMsg: this.state.csvMsg,\n      csvMsgCol: /저장됨/.test(this.state.csvMsg) ? '#1E8E5A' : '#C0392B',\n      csvMsgBg: /저장됨/.test(this.state.csvMsg) ? '#E7F6EE' : '#FCEBEC',\n      isSaved: !!(this.state.analyses || this.state.trades),\n      onReset: () => this.resetAll(),\n      openAdd: () => this.openAdd(), closeAdd: () => this.closeAdd(), submitAdd: () => this.addAnalysis(),\n      aiSeg, sampleCsvHref, onCsvFile: e => this.onCsvFile(e),\n      onName: e => this.setF('f_name', e.target.value), onContent: e => this.setF('f_content', e.target.value),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
